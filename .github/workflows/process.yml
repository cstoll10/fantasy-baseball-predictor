name: Process Baseball Data

on:
  push:
    paths:
      - 'data/projections/**'
      - 'scripts/process.py'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch historical data
        run: |
          mkdir -p data/raw
          python - << 'PYEOF'
          from pybaseball import batting_stats, pitching_stats
          print("Fetching hitters 2022-2025...")
          batting_stats(2022, 2025, qual=150).to_csv("data/raw/hitters_all.csv", index=False)
          print("Fetching pitchers 2022-2025...")
          pitching_stats(2022, 2025, qual=50).to_csv("data/raw/pitchers_all.csv", index=False)
          print("Done.")
          PYEOF

      - name: Run processing script
        run: python scripts/process.py

      - name: Commit updated players.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/players.json
          git diff --staged --quiet || git commit -m "Auto-update players.json [skip ci]"
          git push
