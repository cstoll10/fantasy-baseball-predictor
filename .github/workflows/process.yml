name: Process Baseball Data

on:
  push:
    paths:
      - 'data/projections/**'
      - 'scripts/process.py'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run processing script
        run: python scripts/process.py

      - name: Commit updated players.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/players.json
          git diff --staged --quiet || git commit -m "Auto-update players.json [skip ci]"
          git push
