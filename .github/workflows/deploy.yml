name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: pip install pandas numpy scikit-learn pybaseball
      - name: Fetch 2025 data
        run: python3 scripts/fetch_2025.py
      - name: Run projection model
        run: python3 model/projections.py
      - name: Export JSON
        run: PYTHONPATH=. python3 model/export_json.py
      - name: Verify players.json was created
        run: ls -la public/players.json
      - name: Build frontend
        run: npm ci && npm run build
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
