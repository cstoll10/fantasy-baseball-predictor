name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run projection model
        run: |
          pip install pandas numpy scikit-learn pybaseball
          python3 -c "
from pybaseball import batting_stats
df = batting_stats(2025, 2025, qual=20)
df.to_csv('data/raw/hitters_2025.csv', index=False)
print('Fetched', len(df), '2025 players')
"
          python3 model/projections.py
          python3 model/export_json.py
      - name: Verify players.json was created
        run: ls -la public/players.json
      - name: Build frontend
        run: npm ci && npm run build
      - name: Verify dist contents
        run: ls -la dist/
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
